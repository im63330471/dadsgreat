<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Matrix Compare</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: black;
        color: #0f0;
        font-family: 'Courier New', monospace;
        height: 100vh;
        overflow-x: hidden;
    }

    .container {
        position: relative;
        z-index: 10;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }

    .input-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        margin-bottom: 30px;
    }

    input[type="text"] {
        background: rgba(0,0,0,0.5);
        color: #fff;
        border: 1px solid #0f0;
        border-radius: 5px;
        padding: 10px 14px;
        font-family: monospace;
        font-size: 16px;
        width: 320px;
        max-width: 90vw;
    }

    button {
        background: #0f0;
        color: black;
        border: none;
        padding: 12px 28px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 5px;
    }

    button:hover {
        background: #0c0;
    }

    #resultTable {
        background: rgba(0,0,0,0.5);
        border-collapse: collapse;
        border-radius: 5px;
        margin-top: 30px;
        font-size: 15px;
        color: white;
        z-index: 20;
        position: relative;
        overflow: hidden;
    }

    #resultTable td {
        padding: 8px 14px;
        border: none;
        text-align: center;
        min-width: 130px;
    }

    /* item present in other array */
    .match { animation: flashGreen 1.4s infinite; }

    /* item not present in other array */
    .nomatch { animation: flashRedFast 0.7s infinite; }

    @keyframes flashGreen {
        0%,100% { color: #0f0; }
        50%     { color: #fff; }
    }

    @keyframes flashRedFast {
        0%,100% { color: #f00; }
        50%     { color: #fff; }
    }

    /* Matrix rain background */
    canvas {
        position: fixed;
        top: 0; left: 0;
        z-index: 1;
        pointer-events: none;
    }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
    <div class="input-row">
        <input type="text" id="inputA" placeholder="Input A">
        <input type="text" id="inputB" placeholder="Input B">
        <button id="buttonRun">Run</button>
    </div>

    <div id="resultTable"></div>
</div>

<script>
// Matrix rain background
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*';
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = Array(Math.floor(columns)).fill(1);

function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#0f0';
    ctx.font = fontSize + 'px monospace';

    for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        const x = i * fontSize;
        const y = drops[i] * fontSize;

        // occasional color variation
        if (Math.random() > 0.97) ctx.fillStyle = '#0ff';
        else if (Math.random() > 0.94) ctx.fillStyle = '#f0f';
        else ctx.fillStyle = '#0f0';

        ctx.fillText(text, x, y);

        if (y > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}

setInterval(draw, 40);

window.addEventListener('resize', () => {
    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;
});

// Main logic
document.getElementById('buttonRun').addEventListener('click', () => {
    // Scroll input-row to top of screen
    const inputRow = document.querySelector('.input-row');
    inputRow.scrollIntoView({ behavior: 'smooth', block: 'start' });
    
    const a = document.getElementById('inputA').value.replace(/[^a-zA-Z0-9]/g, '');
    const b = document.getElementById('inputB').value.replace(/[^a-zA-Z0-9]/g, '');

    const arrayA = [];
    const arrayB = [];

    for (let i = 0; i < a.length; i += 13) {
        const chunk = a.slice(i, i + 13);
        if (chunk.length === 13) arrayA.push(chunk);
    }

    for (let i = 0; i < b.length; i += 13) {
        const chunk = b.slice(i, i + 13);
        if (chunk.length === 13) arrayB.push(chunk);
    }

    arrayA.sort();
    arrayB.sort();

    // Detect duplicates
    const dupA = new Set(arrayA.filter((v, i) => arrayA.indexOf(v) !== i));
    const dupB = new Set(arrayB.filter((v, i) => arrayB.indexOf(v) !== i));

    // Separate items into nomatch and match for both arrays
    const itemsA = [];
    const itemsB = [];

    for (let i = 0; i < arrayA.length; i++) {
        let val = arrayA[i];
        const isMatch = arrayB.includes(val);
        const isDup = dupA.has(val);
        itemsA.push({ val, isMatch, isDup, col: 'A' });
    }

    for (let i = 0; i < arrayB.length; i++) {
        let val = arrayB[i];
        const isMatch = arrayA.includes(val);
        const isDup = dupB.has(val);
        itemsB.push({ val, isMatch, isDup, col: 'B' });
    }

    // Sort by isMatch (false first = nomatch on top)
    itemsA.sort((a, b) => a.isMatch - b.isMatch);
    itemsB.sort((a, b) => a.isMatch - b.isMatch);

    const maxRows = Math.max(itemsA.length, itemsB.length);
    let html = '<table id="resultTable">';

    for (let i = 0; i < maxRows; i++) {
        let cellA = '<td></td>';
        if (i < itemsA.length) {
            const item = itemsA[i];
            let displayVal = item.val;
            if (item.isDup) {
                displayVal = 'dup ' + displayVal;
            }
            const cls = item.isMatch ? 'match' : 'nomatch';
            cellA = `<td class="${cls}">${displayVal}</td>`;
        }

        let cellB = '<td></td>';
        if (i < itemsB.length) {
            const item = itemsB[i];
            let displayVal = item.val;
            if (item.isDup) {
                displayVal = 'dup ' + displayVal;
            }
            const cls = item.isMatch ? 'match' : 'nomatch';
            cellB = `<td class="${cls}">${displayVal}</td>`;
        }

        html += `<tr>${cellA}${cellB}</tr>`;
    }

    html += '</table>';

    document.getElementById('resultTable').innerHTML = html;
});

</script>
</body>
</html>
